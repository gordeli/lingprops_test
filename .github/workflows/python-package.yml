name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install build tools
      run: pip install -U pip build pytest
    - name: Build
      run: python -m build
    - name: Install
      run: pip install dist/*.whl
    - name: Test
      run: pytest -q
